services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoice_pass}
      POSTGRES_DB: ${POSTGRES_DB:-invoice_manager}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice_user} -d ${POSTGRES_DB:-invoice_manager}"]
      interval: 5s
      timeout: 3s
      retries: 5

  invoice_manager:
    image: ghcr.io/thomaslty/invoice_manager:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://invoice_user:invoice_pass@postgres:5432/invoice_manager}
      PORT: 3000
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-}
      OIDC_NAME: ${OIDC_NAME:-}
      OIDC_AUTO_CREATE_USER: ${OIDC_AUTO_CREATE_USER:-}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-}
      BYPASS_LOGIN: ${BYPASS_LOGIN:-}
    volumes:
      - uploads:/app/backend/uploads
      - fonts:/app/backend/fonts

volumes:
  pgdata:
  uploads:
  fonts:
