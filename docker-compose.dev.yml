services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoice_pass}
      POSTGRES_DB: ${POSTGRES_DB:-invoice_manager}
    volumes:
      - pgdata_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice_user} -d ${POSTGRES_DB:-invoice_manager}"]
      interval: 5s
      timeout: 3s
      retries: 5

  invoice_manager:
    container_name: invoice_manager_dev
    build:
      context: .
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5173:5173"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://invoice_user:invoice_pass@postgres:5432/invoice_manager}
      PORT: 3000
      BYPASS_LOGIN: "true"
      VITE_PROXY_TARGET: http://localhost:3000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./backend/src:/app/backend/src
      - ./backend/uploads:/app/backend/uploads
      - ./backend/fonts:/app/backend/fonts
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["supervisord", "-c", "/etc/supervisor/conf.d/supervisord.dev.conf"]

volumes:
  pgdata_dev:
